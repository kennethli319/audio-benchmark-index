  - id: audioset
    name: AudioSet
    full_name: "Audio Set: An ontology and human-labeled dataset for audio events"
    qwen_cited_as: null
    qwen_bucket: audio_event_classification
    tasks:
      - audio_event_classification
      - audio_tagging
      - sound_event_detection
    official:
      homepage: https://research.google.com/audioset/
      download_page: https://research.google.com/audioset/download.html
      ontology_repo: https://github.com/audioset/ontology
      paper: https://research.google/pubs/audio-set-an-ontology-and-human-labeled-dataset-for-audio-events/
    download:
      primary:
        - https://storage.googleapis.com/us_audioset/youtube_corpus/v1/csv/eval_segments.csv
        - https://storage.googleapis.com/us_audioset/youtube_corpus/v1/csv/balanced_train_segments.csv
        - https://storage.googleapis.com/us_audioset/youtube_corpus/v1/csv/unbalanced_train_segments.csv
        - https://storage.googleapis.com/us_audioset/youtube_corpus/v1/csv/class_labels_indices.csv
        - https://storage.googleapis.com/us_audioset/youtube_corpus/v1/features/features.tar.gz
      examples:
        - 'curl -L -O https://storage.googleapis.com/us_audioset/youtube_corpus/v1/csv/eval_segments.csv'
        - 'AUDIOSET_DOWNLOAD_FEATURES=1 AUDIOSET_REGION=us scripts/download/audioset.sh'
      notes: Official release provides segment CSVs and precomputed 128-dimensional audio features; it does not redistribute original YouTube audio.
    license:
      data: cc-by-4.0
      code: not_applicable
      notes: AudioSet dataset annotations/features are CC BY 4.0; the ontology is CC BY-SA 4.0. Original YouTube media remains subject to upstream availability and terms.
    sources:
      - https://research.google.com/audioset/
      - https://research.google.com/audioset/download.html
      - https://research.google/pubs/audio-set-an-ontology-and-human-labeled-dataset-for-audio-events/
      - https://github.com/audioset/ontology

  - id: clotho
    name: Clotho
    full_name: "Clotho: An Audio Captioning Dataset"
    qwen_cited_as: null
    qwen_bucket: audio_captioning
    tasks:
      - audio_captioning
      - language_based_audio_retrieval
    official:
      zenodo_record: https://zenodo.org/records/4783391
      repo: https://github.com/audio-captioning/clotho-dataset
      dcase_task: https://dcase.community/challenge2022/task-automatic-audio-captioning
      paper: https://arxiv.org/abs/1910.09387
    download:
      primary:
        - https://zenodo.org/records/4783391
      examples:
        - 'curl -L -o clotho_captions_development.csv "https://zenodo.org/records/4783391/files/clotho_captions_development.csv?download=1"'
        - 'CLOTHO_DOWNLOAD_AUDIO=1 scripts/download/clotho.sh'
      notes: Clotho v2.1 audio archives total about 7.1 GiB; the helper downloads captions/metadata by default and makes audio opt-in.
    license:
      data: mixed
      code: not_specified
      notes: Zenodo lists rights as Other (Attribution). Audio clips keep their original Freesound licenses, mostly Creative Commons with attribution, recorded in metadata CSVs. Captions are under the Tampere University license, mainly non-commercial with attribution.
    sources:
      - https://zenodo.org/records/4783391
