    name: SpEmoC
    full_name: "SpEmoC: A Balanced Speaker-Segment Multimodal Emotion Benchmark"
    qwen_cited_as: null
    qwen_bucket:
      - speech_emotion_recognition
      - audio_visual_understanding
    tasks:
      - speech_emotion_recognition
      - audio_visual_emotion_recognition
