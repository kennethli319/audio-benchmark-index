        evaluation reports clean/reverberant WER and CER plus the reverb
        penalty, with RT60 and DRR metadata when available. The helper saves
        the dataset card, API metadata, paper, and small leaderboard files by
        default. The Hugging Face API reports about 1.13 GB of repository
        storage, so the complete audio and Arrow snapshot requires
        WHISPER_RIRMEGA_DOWNLOAD_HF=1. The paper's cited GitHub code repository
        returned HTTP 404 when checked on 2026-07-22.
