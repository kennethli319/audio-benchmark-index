    license:
      data: mit
      code: MIT
      notes: Qwen uses the pro track. HF card and GitHub repo list MIT.
    sources:
      - https://github.com/Ruiqi-Yan/URO-Bench
      - https://huggingface.co/datasets/Honggao/URO-Bench

  - id: speechrole
