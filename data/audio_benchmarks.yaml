metadata:
  repo_name: audio-benchmark-index
  title: Audio Benchmark Index
  seed_source:
    name: Qwen3.5-Omni Technical Report, section 5.1 Audio -> Text
    url: https://arxiv.org/html/2604.15804v1#S5
  last_checked: 2026-07-09
  scope: Audio -> Text benchmarks cited by Qwen3.5-Omni section 5.1.
  note: This index does not mirror datasets or grant rights to upstream data.

benchmarks:
  - id: mmau
    name: MMAU
    full_name: "MMAU: A Massive Multi-Task Audio Understanding and Reasoning Benchmark"
    qwen_cited_as: MMAU
    qwen_bucket: audio_understanding
    tasks:
      - audio_question_answering
      - audio_reasoning
    official:
      homepage: https://sakshi113.github.io/mmau_homepage/
      repo: https://github.com/Sakshi113/MMAU
      paper: https://arxiv.org/abs/2410.19168
    download:
      primary:
        - https://huggingface.co/datasets/gamma-lab-umd/MMAU-test-mini
        - https://huggingface.co/datasets/gamma-lab-umd/MMAU-test
      examples:
        - 'from datasets import load_dataset; ds = load_dataset("gamma-lab-umd/MMAU-test-mini")'
        - 'huggingface-cli download --repo-type dataset gamma-lab-umd/MMAU-test-mini --local-dir data/MMAU-test-mini'
    license:
      data: "HF cards: MMAU-test-mini is cc-by-nc-4.0; MMAU-test is mit"
      code: Apache-2.0
      notes: The two HF dataset cards list different licenses; re-check before redistribution.
    sources:
      - https://github.com/Sakshi113/MMAU
      - https://huggingface.co/datasets/gamma-lab-umd/MMAU-test-mini
      - https://huggingface.co/datasets/gamma-lab-umd/MMAU-test

  - id: mmar
    name: MMAR
    full_name: "MMAR: A Challenging Benchmark for Deep Reasoning in Speech, Audio, Music, and Their Mix"
    qwen_cited_as: MMAR
    qwen_bucket: audio_understanding
    tasks:
      - audio_question_answering
      - audio_reasoning
    official:
      repo: https://github.com/ddlBoJack/MMAR
      paper: https://arxiv.org/abs/2505.13032
      challenge: https://audio-reasoning-challenge.github.io/
    download:
      primary:
        - https://huggingface.co/datasets/BoJack/MMAR
      examples:
        - 'from datasets import load_dataset; ds = load_dataset("BoJack/MMAR")'
        - 'huggingface-cli download --repo-type dataset BoJack/MMAR --local-dir data/MMAR'
    license:
      data: cc-by-nc-4.0
      code: not_specified
      notes: GitHub repo did not expose a detected license; HF dataset card lists cc-by-nc-4.0.
    sources:
      - https://github.com/ddlBoJack/MMAR
      - https://huggingface.co/datasets/BoJack/MMAR

  - id: mmsu
    name: MMSU
    full_name: "MMSU: A Massive Multi-task Spoken Language Understanding and Reasoning Benchmark"
    qwen_cited_as: MMSU
    qwen_bucket: audio_understanding
    tasks:
      - spoken_language_understanding
      - speech_reasoning
    official:
      repo: https://github.com/dingdongwang/MMSU
      paper: https://arxiv.org/abs/2506.04779
      dataset: https://huggingface.co/datasets/ddwang2000/MMSU
    download:
      primary:
        - https://huggingface.co/datasets/ddwang2000/MMSU
      examples:
        - 'from datasets import load_dataset; ds = load_dataset("ddwang2000/MMSU")'
        - 'huggingface-cli download --repo-type dataset ddwang2000/MMSU --local-dir data/MMSU'
    license:
      data: mit
      code: not_specified
      notes: HF dataset card lists MIT; GitHub code repo did not expose a detected license.
    sources:
      - https://github.com/dingdongwang/MMSU
      - https://huggingface.co/datasets/ddwang2000/MMSU

  - id: superb
    name: SUPERB
    full_name: "SUPERB: Speech Processing Universal PERformance Benchmark"
    qwen_cited_as: null
    qwen_bucket: speech_representation_benchmark
    tasks:
      - speech_representation_evaluation
      - phoneme_recognition
      - automatic_speech_recognition
      - keyword_spotting
      - query_by_example_spoken_term_detection
      - speaker_identification
      - automatic_speaker_verification
      - speaker_diarization
      - emotion_recognition
      - intent_classification
      - slot_filling
      - speech_translation
      - speech_enhancement
      - speech_separation
      - voice_conversion
    official:
      homepage: https://superbbenchmark.org/
      repo: https://github.com/s3prl/s3prl
      docs: https://github.com/s3prl/s3prl/blob/master/s3prl/downstream/docs/superb.md
      paper: https://arxiv.org/abs/2105.01051
      interspeech: https://www.isca-archive.org/interspeech_2021/yang21c_interspeech.html
      superb_sg_paper: https://arxiv.org/abs/2203.06849
    download:
      primary:
        - https://github.com/s3prl/s3prl/blob/master/s3prl/downstream/docs/superb.md
        - https://github.com/s3prl/s3prl
        - https://superbbenchmark.org/
      examples:
        - 'scripts/download/superb.sh'
        - 'SUPERB_CLONE_TOOLKIT=1 scripts/download/superb.sh'
      notes: SUPERB is a benchmark suite over multiple upstream corpora. The helper downloads official documentation/license files by default and only clones the S3PRL toolkit with SUPERB_CLONE_TOOLKIT=1; underlying corpora such as LibriSpeech, Speech Commands, VoxCeleb, and IEMOCAP keep their own access paths and licenses.
    license:
      data: mixed
      code: Apache-2.0
      notes: S3PRL is mostly Apache-2.0, with repository notes indicating some Facebook-authored files are CC BY-NC. SUPERB tasks use multiple external datasets, so each component corpus must be downloaded and licensed through its own official source.
    sources:
      - https://superbbenchmark.org/
      - https://github.com/s3prl/s3prl
      - https://github.com/s3prl/s3prl/blob/master/s3prl/downstream/docs/superb.md
      - https://arxiv.org/abs/2105.01051
      - https://www.isca-archive.org/interspeech_2021/yang21c_interspeech.html
      - https://arxiv.org/abs/2203.06849

  - id: slurp
    name: SLURP
    full_name: "SLURP: A Spoken Language Understanding Resource Package"
    qwen_cited_as: null
    qwen_bucket: spoken_language_understanding
    tasks:
      - spoken_language_understanding
      - intent_classification
      - slot_filling
      - semantic_entity_labeling
    official:
      repo: https://github.com/pswietojanski/slurp
      paper: https://aclanthology.org/2020.emnlp-main.588/
      zenodo: https://zenodo.org/records/4274930
      arxiv: https://arxiv.org/abs/2011.13205
    download:
      primary:
        - https://github.com/pswietojanski/slurp
        - https://zenodo.org/records/4274930
        - https://zenodo.org/api/records/4274930/files/LICENSE.txt/content
        - https://zenodo.org/api/records/4274930/files/slurp_real.tar.gz/content
        - https://zenodo.org/api/records/4274930/files/slurp_synth.tar.gz/content
      examples:
        - 'scripts/download/slurp.sh'
        - 'SLURP_DOWNLOAD_AUDIO=1 SLURP_AUDIO_PARTS=real scripts/download/slurp.sh'
        - 'SLURP_DOWNLOAD_AUDIO=1 SLURP_AUDIO_PARTS="real synth" scripts/download/slurp.sh'
      notes: The helper clones or updates the official annotation/code repository by default and downloads Zenodo LICENSE.txt. Audio archives are about 3.9 GiB real plus 2.8 GiB synthetic, so audio download is an explicit opt-in.
    license:
      data: "Textual annotations are CC BY 4.0; Zenodo-hosted audio is non-commercial (Zenodo license id other-nc; GitHub README states CC BY-NC 4.0)."
      code: not_specified
      notes: GitHub README separates textual data and audio licensing and says a less-strict audio license may be available by contacting the dataset owner. No standalone code license file was found in the repo via raw GitHub on 2026-07-09.
    sources:
      - https://github.com/pswietojanski/slurp
      - https://zenodo.org/records/4274930
      - https://aclanthology.org/2020.emnlp-main.588/
      - https://arxiv.org/abs/2011.13205

  - id: slue
    name: SLUE
    full_name: "SLUE: Spoken Language Understanding Evaluation"
    qwen_cited_as: null
    qwen_bucket: spoken_language_understanding
    tasks:
      - spoken_language_understanding
      - automatic_speech_recognition
      - named_entity_recognition
      - named_entity_localization
      - sentiment_analysis
    official:
      homepage: https://asappresearch.github.io/slue-toolkit/
      repo: https://github.com/asappresearch/slue-toolkit
      paper: https://arxiv.org/abs/2111.10367
      dataset: https://huggingface.co/datasets/asapp/slue
      phase_2_dataset: https://huggingface.co/datasets/asapp/slue-phase-2
    download:
      primary:
        - https://huggingface.co/datasets/asapp/slue
        - https://huggingface.co/datasets/asapp/slue-phase-2
        - https://github.com/asappresearch/slue-toolkit
        - https://papers-slue.awsdev.asapp.com/slue-voxpopuli_LICENSE
        - https://papers-slue.awsdev.asapp.com/slue-voxceleb_LICENSE
      examples:
        - 'scripts/download/slue.sh'
        - 'SLUE_DOWNLOAD_HF=1 scripts/download/slue.sh'
        - 'SLUE_DOWNLOAD_HF=1 SLUE_DATASETS=slue-phase-2 scripts/download/slue.sh'
        - 'SLUE_CLONE_TOOLKIT=1 scripts/download/slue.sh'
      notes: The helper downloads official toolkit docs and component license files by default. Hugging Face dataset snapshots are opt-in because they contain audio-derived benchmark data; use SLUE_DATASETS to choose slue, slue-phase-2, or both.
    license:
      data: "SLUE-VoxPopuli is CC0; SLUE-VoxCeleb is CC BY 4.0; HF dataset metadata also advertises cc0-1.0 and cc-by-4.0 tags."
      code: MIT
      notes: SLUE redistributes curated subsets of VoxPopuli and VoxCeleb plus task annotations. The VoxCeleb license notice says original and cropped video copyrights remain with the original owners.
    sources:
      - https://asappresearch.github.io/slue-toolkit/
      - https://github.com/asappresearch/slue-toolkit
      - https://arxiv.org/abs/2111.10367
      - https://huggingface.co/datasets/asapp/slue
      - https://huggingface.co/datasets/asapp/slue-phase-2
      - https://papers-slue.awsdev.asapp.com/slue-voxpopuli_LICENSE
      - https://papers-slue.awsdev.asapp.com/slue-voxceleb_LICENSE

  - id: minds14
    name: MInDS-14
    full_name: "MInDS-14: Multilingual and Cross-Lingual Intent Detection from Spoken Data"
    qwen_cited_as: null
    qwen_bucket: spoken_language_understanding
    tasks:
      - spoken_language_understanding
      - intent_classification
      - automatic_speech_recognition
      - multilingual_speech_understanding
    official:
      dataset: https://huggingface.co/datasets/PolyAI/minds14
      paper: https://arxiv.org/abs/2104.08524
    download:
      primary:
        - https://huggingface.co/datasets/PolyAI/minds14
        - https://huggingface.co/datasets/PolyAI/minds14/raw/main/README.md
      examples:
        - 'from datasets import load_dataset; ds = load_dataset("PolyAI/minds14", "en-US", split="train")'
        - 'scripts/download/minds14.sh'
        - 'MINDS14_DOWNLOAD_HF=1 MINDS14_CONFIG=en-US scripts/download/minds14.sh'
        - 'MINDS14_DOWNLOAD_HF=1 MINDS14_CONFIG=all scripts/download/minds14.sh'
      notes: The helper downloads the Hugging Face dataset card by default. Dataset snapshots include audio and are opt-in; choose one locale such as en-US or all with MINDS14_CONFIG.
    license:
      data: cc-by-4.0
      code: not_specified
      notes: Hugging Face dataset card lists CC BY 4.0 and exposes 14 spoken e-banking intents across 14 language varieties. No separate code license was identified for the dataset card.
    sources:
      - https://huggingface.co/datasets/PolyAI/minds14
      - https://huggingface.co/datasets/PolyAI/minds14/raw/main/README.md
      - https://arxiv.org/abs/2104.08524

  - id: hear
    name: HEAR
    full_name: "HEAR: Holistic Evaluation of Audio Representations"
    qwen_cited_as: null
    qwen_bucket: speech_audio_music_representation_benchmark
    tasks:
      - audio_representation_evaluation
      - speech_classification
      - environmental_sound_classification
      - music_classification
      - event_based_audio_prediction
    official:
      homepage: https://hearbenchmark.com/
      tasks: https://hearbenchmark.com/hear-tasks.html
      repo: https://github.com/hearbenchmark/hear-eval-kit
      preprocess_repo: https://github.com/hearbenchmark/hear-preprocess
      paper: https://arxiv.org/abs/2203.03022
      pmlr: https://proceedings.mlr.press/v166/
      zenodo: https://zenodo.org/records/5885750
    download:
      primary:
        - https://zenodo.org/records/5885750
        - https://zenodo.org/api/records/5885750/files/LICENSE.txt/content
        - https://github.com/hearbenchmark/hear-eval-kit
      examples:
        - 'scripts/download/hear.sh'
        - 'HEAR_DOWNLOAD_TASKS=1 HEAR_TASKS=hear2021-mridangam_tonic-v1.5-full-48000.tar.gz scripts/download/hear.sh'
        - 'HEAR_CLONE_EVAL_KIT=1 scripts/download/hear.sh'
      notes: The helper downloads the Zenodo record metadata and LICENSE.txt by default. Individual task archives are large and opt-in; the Zenodo record notes that TFDS-derived crema-d, GTZAN genre, and GTZAN music/speech tasks in this release were retracted because of a preprocessing bug.
    license:
      data: mixed
      code: Apache-2.0
      notes: Zenodo record lists CC BY 4.0 but explicitly says component datasets have different open licenses and to inspect each dataset's LICENSE.txt; eval kit repo is Apache-2.0.
    sources:
      - https://hearbenchmark.com/
      - https://hearbenchmark.com/hear-tasks.html
      - https://github.com/hearbenchmark/hear-eval-kit
      - https://zenodo.org/records/5885750
      - https://arxiv.org/abs/2203.03022

  - id: dynamic_superb
    name: Dynamic-SUPERB
    full_name: "Dynamic-SUPERB: A dynamic, collaborative, and comprehensive instruction-tuning benchmark for speech"
    qwen_cited_as: null
    qwen_bucket: speech_instruction_benchmark
    tasks:
      - spoken_language_model_evaluation
      - instruction_following
      - speech_understanding
      - audio_understanding
      - music_understanding
      - classification
      - regression
      - sequence_generation
    official:
      repo: https://github.com/dynamic-superb/dynamic-superb
      leaderboard: https://huggingface.co/spaces/DynamicSuperb/leaderboard
      phase1_paper: https://arxiv.org/abs/2309.09510
      phase2_paper: https://arxiv.org/abs/2411.05361
    download:
      primary:
        - https://github.com/dynamic-superb/dynamic-superb
        - https://raw.githubusercontent.com/dynamic-superb/dynamic-superb/main/README.md
        - https://raw.githubusercontent.com/dynamic-superb/dynamic-superb/main/docs/leaderboard_gpt_evaluation.md
        - https://huggingface.co/spaces/DynamicSuperb/leaderboard
      examples:
        - 'scripts/download/dynamic_superb.sh'
        - 'DYNAMIC_SUPERB_CLONE_REPO=1 scripts/download/dynamic_superb.sh'
      notes: The helper downloads the official README and leaderboard documentation by default and clones the benchmark repository only with DYNAMIC_SUPERB_CLONE_REPO=1. The benchmark is collaborative and spans many speech, music, and general sound tasks, so underlying task data should be checked through each component source before use.
    license:
      data: mixed
      code: not_specified
      notes: GitHub API reported no repository license on 2026-07-09. The benchmark aggregates tasks from many component datasets; use the official task metadata and each upstream corpus license before redistribution, training, or commercial use.
    sources:
      - https://github.com/dynamic-superb/dynamic-superb
      - https://raw.githubusercontent.com/dynamic-superb/dynamic-superb/main/README.md
      - https://huggingface.co/spaces/DynamicSuperb/leaderboard
      - https://arxiv.org/abs/2309.09510
      - https://arxiv.org/abs/2411.05361

  - id: rul_muchomusic
    name: RUL-MuchoMusic
    full_name: "RUL-MuchoMusic from RUListening / Are You Really Listening?"
    qwen_cited_as: RUL-MuchoMusic
    qwen_bucket: audio_understanding
    tasks:
      - music_question_answering
      - perceptual_music_understanding
    official:
      repo: https://github.com/yongyizang/AreYouReallyListening
      paper: https://arxiv.org/abs/2504.00369
      upstream_benchmark: https://github.com/mulab-mir/muchomusic
    download:
      primary:
        - https://raw.githubusercontent.com/yongyizang/AreYouReallyListening/main/RUL-MuchoMusic.json
        - https://huggingface.co/datasets/yongyizang/RUListening
      examples:
        - 'wget -P data/RUL-MuchoMusic https://raw.githubusercontent.com/yongyizang/AreYouReallyListening/main/RUL-MuchoMusic.json'
        - 'huggingface-cli download --repo-type dataset yongyizang/RUListening --local-dir data/RUListening'
    license:
      data: "RUL repo/HF card: mit; upstream MuChoMusic dataset: CC BY-SA 4.0"
      code: MIT
      notes: RUL-MuchoMusic derives from MuChoMusic; check upstream audio/source terms too.
    sources:
      - https://github.com/yongyizang/AreYouReallyListening
      - https://huggingface.co/datasets/yongyizang/RUListening
      - https://github.com/mulab-mir/muchomusic
      - https://zenodo.org/records/12709974

  - id: songformbench
    name: SongFormBench
    full_name: SongFormBench
    qwen_cited_as: SongFormBench
    qwen_bucket: audio_understanding
    tasks:
      - music_structure_analysis
    official:
      repo: https://github.com/ASLP-lab/SongFormer
      dataset: https://huggingface.co/datasets/ASLP-lab/SongFormBench
      paper: https://arxiv.org/abs/2510.02797
    download:
      primary:
        - https://huggingface.co/datasets/ASLP-lab/SongFormBench
      examples:
        - 'from datasets import load_dataset; ds = load_dataset("ASLP-lab/SongFormBench")'
        - 'huggingface-cli download --repo-type dataset ASLP-lab/SongFormBench --local-dir data/SongFormBench'
    license:
      data: cc-by-4.0
      code: cc-by-4.0
      notes: Dataset card lists CC BY 4.0. Audio reconstruction notes reference HarmonixSet and BigVGAN resources.
    sources:
      - https://huggingface.co/datasets/ASLP-lab/SongFormBench
      - https://github.com/ASLP-lab/SongFormer

  - id: nsynth
    name: NSynth
    full_name: "NSynth: Neural Audio Synthesis of Musical Notes with WaveNet Autoencoders"
    qwen_cited_as: null
    qwen_bucket: music_synthesis
    tasks:
      - audio_synthesis
      - music_synthesis
      - musical_instrument_modeling
      - timbre_modeling
    official:
      homepage: https://magenta.withgoogle.com/datasets/nsynth
      paper: https://arxiv.org/abs/1704.01279
      pmlr_paper: https://proceedings.mlr.press/v70/engel17a.html
      tfds: https://www.tensorflow.org/datasets/catalog/nsynth
    download:
      primary:
        - https://magenta.withgoogle.com/datasets/nsynth
        - https://storage.googleapis.com/download.magenta.tensorflow.org/datasets/nsynth/nsynth-test.jsonwav.tar.gz
        - https://storage.googleapis.com/download.magenta.tensorflow.org/datasets/nsynth/nsynth-test.tfrecord
      examples:
        - 'scripts/download/nsynth.sh'
        - 'NSYNTH_DOWNLOAD_ARCHIVES=1 NSYNTH_SPLITS=test NSYNTH_FORMAT=jsonwav scripts/download/nsynth.sh'
        - 'python -c "import tensorflow_datasets as tfds; tfds.load(\"nsynth\", split=\"test\")"'
      notes: The full TFDS download is about 73 GiB. The helper saves the official dataset page by default and requires NSYNTH_DOWNLOAD_ARCHIVES=1 before downloading split archives.
    license:
      data: cc-by-4.0
      code: Apache-2.0
      notes: Official Magenta dataset page lists the dataset under CC BY 4.0; Magenta code is Apache-2.0.
    sources:
      - https://magenta.withgoogle.com/datasets/nsynth
      - https://www.tensorflow.org/datasets/catalog/nsynth
      - https://arxiv.org/abs/1704.01279
      - https://proceedings.mlr.press/v70/engel17a.html

  - id: maestro
    name: MAESTRO
    full_name: "MAESTRO: MIDI and Audio Edited for Synchronous TRacks and Organization"
    qwen_cited_as: null
    qwen_bucket: music_transcription
    tasks:
      - automatic_music_transcription
      - piano_transcription
      - music_synthesis
      - symbolic_music_modeling
    official:
      homepage: https://magenta.withgoogle.com/datasets/maestro
      blog: https://magenta.withgoogle.com/maestro-wave2midi2wave
      paper: https://arxiv.org/abs/1810.12247
      openreview: https://openreview.net/forum?id=r1lYRjC9F7
    download:
      primary:
        - https://magenta.withgoogle.com/datasets/maestro
        - https://storage.googleapis.com/magentadata/datasets/maestro/v3.0.0/maestro-v3.0.0.csv
        - https://storage.googleapis.com/magentadata/datasets/maestro/v3.0.0/maestro-v3.0.0.json
