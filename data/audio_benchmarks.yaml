      - singing_voice_separation
    official:
      homepage: http://mirlab.org/dataset/public/
      direct_archive: http://mirlab.org/dataset/public/MIR-1K.rar
      direct_archive_status: returned_404_on_2026_07_09
      figshare_mirror: https://figshare.com/articles/dataset/MIR-1K_rar/5802891
      figshare_direct_file: https://ndownloader.figshare.com/files/10256751
