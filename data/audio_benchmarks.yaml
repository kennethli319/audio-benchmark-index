      primary:
        - https://www.frdr-dfdr.ca/repo/dataset/487f5583-250a-464b-bb71-f2da85410b13
        - https://github.com/mahsa-abdollahi/UrBAN
      examples:
        - 'scripts/download/urban_beehive.sh'
      notes: >-
        The public FRDR release contains longitudinal 2021-2022 raw 16 kHz
        beehive audio plus inspection, temperature, humidity, and weather
        metadata from a ten-hive Montréal rooftop apiary. The Scientific Data
        descriptor reports more than 3,000 hours, while the older FRDR record
        and repository README say more than 2,000 hours; the current FRDR
        landing page reports approximately 1.265 TB of files. Its benchmark
        protocols include random-split and hive-independent colony-strength
        regression. A 2026 follow-up evaluates modulation-tensorgram models on
        nine hives and emphasizes cross-hive generalization. The helper saves
        official landing pages, repository documentation, and API metadata
        only. Full data transfer remains a manual FRDR Globus workflow because
        of the corpus size and may require a Globus account and client.
    license:
      data: CC-BY-4.0
      code: not_specified
      paper: CC-BY-NC-ND-4.0
      notes: >-
        The FRDR dataset record explicitly lists CC BY 4.0. The GitHub
        repository has no detected license, so the analysis notebooks and
        scripts should not be assumed to use the dataset license. The
        Scientific Data article itself is CC BY-NC-ND 4.0, distinct from the
        dataset terms.
    sources:
