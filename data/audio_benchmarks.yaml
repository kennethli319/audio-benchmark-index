metadata:
  repo_name: audio-benchmark-index
  title: Audio Benchmark Index
  seed_source:
    name: Qwen3.5-Omni Technical Report, section 5.1 Audio -> Text
    url: https://arxiv.org/html/2604.15804v1#S5
  last_checked: 2026-07-22
  scope: Audio -> Text benchmarks cited by Qwen3.5-Omni section 5.1, plus broader speech/audio/music benchmarks added from primary sources.
  note: This index does not mirror datasets or grant rights to upstream data.

paper_audits:
  qwen3_tts_technical_report:
    paper: https://arxiv.org/abs/2601.15621
    sections: 4.1-4.2
    evaluated_sets:
      - cited_as: CommonVoice
        index_id: common_voice
        status: public
      - cited_as: Fleurs
        index_id: fleurs
        status: public
      - cited_as: LibriSpeech test-clean
        index_id: librispeech
        status: public
      - cited_as: Seed-TTS test set
        index_id: seed_tts_eval
        status: public_objective_set
        note: The Seed-TTS paper says its separate subjective set is unreleased because of copyright restrictions.
      - cited_as: TTS multilingual test set
        index_id: tts_multilingual_test_set
        status: public
      - cited_as: Cross-Lingual benchmark
        index_id: cv3_eval
        status: public
      - cited_as: InstructTTSEval
        index_id: instruct_tts_eval
        status: public
      - cited_as: long speech test set
        index_id: null
        status: internal_unreleased
        note: Section 4.2.6 describes 100 curated Chinese and English texts of 200 to 2,000 words; the report provides no public dataset or download link.
  qwen3_5_omni_x_to_speech:
    paper: https://arxiv.org/abs/2604.15804
    sections: 5.2-5.2.4
    evaluated_sets:
      - cited_as: SEED-TTS test set
        index_id: seed_tts_eval
        status: public_objective_set
        note: Section 5.2.1 reports WER on the public objective test-zh and test-en splits. The separate Seed-TTS subjective set remains unreleased.
      - cited_as: TTS multilingual test set
        index_id: tts_multilingual_test_set
        status: public
        note: Sections 5.2.2 and 5.2.4 use the official MiniMaxAI release for public benchmark languages; the report also mixes in a separate internal set for additional languages.
      - cited_as: internal multilingual test set built on FLEURS
        index_id: null
        status: internal_unreleased
        note: Sections 5.2.2 and 5.2.4 identify this as an internal FLEURS-derived set and provide no release or exact row mapping. FLEURS is public, but that does not make Qwen's derived evaluation set public.
      - cited_as: CV3-Eval / Cross-Lingual benchmark
        index_id: cv3_eval
        status: public
        note: Section 5.2.3 evaluates 12 source-target directions from the public CV3-Eval cross-lingual subset.
  qwen3_5_omni_audio_to_text:
    paper: https://arxiv.org/abs/2604.15804
    sections: 5.1 Audio -> Text and 5.1.2
    evaluated_sets:
      - cited_as: MMAU
        index_id: mmau
        status: public
      - cited_as: MMAR
        index_id: mmar
        status: public
      - cited_as: MMSU
        index_id: mmsu
        status: public
      - cited_as: RUL-MuchoMusic
        index_id: rul_muchomusic
        status: public
      - cited_as: SongFormBench-HarmonixSet / SongFormBench-CN
        index_id: songformbench
        status: public
        note: Table 5 uses the SongForm-HX-8Class closed vocabulary and a unified prompt requiring SRT-like timestamps.
      - cited_as: VoiceBench
        index_id: voicebench
        status: public
      - cited_as: URO-Bench-pro
        index_id: uro_bench_pro
        status: public
        note: Table 5 uses the pro track and GenStyle-en, GenStyle-zh, and Multilingual tasks for its oral-conversation dimension.
      - cited_as: SpeechRole
        index_id: speechrole
        status: public
      - cited_as: WildSpeech-Bench
        index_id: wildspeech_bench
        status: public
      - cited_as: Fleurs S2TT top59
        index_id: fleurs
        status: public
        note: Table 5 reports translation between each of 59 languages and English or Chinese; Afrikaans is excluded because the report says its S2TT test set does not cover it.
      - cited_as: Fleurs ASR top60
        index_id: fleurs
        status: public
      - cited_as: CV15 (zh / yue / zh-tw / en)
        index_id: common_voice
        status: public
        note: Table 5 identifies Common Voice release 15 and reports separate Mandarin, Cantonese, Taiwan Mandarin, and English WER.
      - cited_as: Librispeech (clean / other)
        index_id: librispeech
        status: public
      - cited_as: Weneetspeech (net / meeting)
        index_id: wenetspeech
        status: public
        note: The table spells the benchmark Weneetspeech; this maps to the official WenetSpeech corpus and its test_net and test_meeting subsets.
      - cited_as: Kespeech
        index_id: kespeech
        status: public_restricted_terms
      - cited_as: MIR-1K (vocal-only)
        index_id: mir_1k_vocal
        status: public
        note: The report evaluates vocal-only singing transcription and converts the transcription into Simplified Chinese.
      - cited_as: Opencpop
        index_id: opencpop_test
        status: public_application_required
  qwen3_5_omni_audio_visual_to_text:
    paper: https://arxiv.org/abs/2604.15804
    sections: 5.1.4
    evaluated_sets:
      - cited_as: DailyOmni
        index_id: daily_omni
        status: public
      - cited_as: WorldSense
        index_id: worldsense
        status: public
      - cited_as: AVUT
        index_id: avut
        status: public
      - cited_as: AV-SpeakerBench
        index_id: av_speakerbench
        status: public
      - cited_as: VideoMME w/ audio
        index_id: video_mme
        status: public_restricted_terms
        note: Table 7 evaluates Video-MME with use_audio_in_video=True; the official release is public but carries academic-research-only terms.
      - cited_as: Qualcomm IVD
        index_id: qivd
        status: public_manual_download
        note: The official Qualcomm release requires its account/download flow; no public dataset license text was found on the landing page.
      - cited_as: OmniCloze
        index_id: omni_cloze
        status: public
      - cited_as: OmniGAIA
        index_id: omnigaia
        status: public
        note: Table 7 evaluates without a thinking prompt or answer-tag formatting and uses DeepSeek-V3.2-Thinking as the judge.

  rw_voice_eq_bench:
    paper: https://arxiv.org/abs/2607.14846
    sections: 2 and 4-7
    status: audited_not_indexed
    public_interfaces:
      - https://huggingface.co/spaces/HumeAI/rw-voice-eq
      - https://huggingface.co/spaces/HumeAI/asr-leaderboard
    evaluated_domains:
      - domain: text_to_speech
        protocol: 30 evaluations across seven dimensions, with up to 120 prompts per category
        data_status: no_public_item_release_found
      - domain: speech_to_speech
        protocol: Five task families using fixed user audio, prerecorded prompts, and matched audio-only/transcript-only conditions where applicable
        data_status: no_public_item_release_found
      - domain: speech_understanding
        protocol: Six emotion, speaker-matching, and synthetic-speech-detection evaluations
        data_status: no_public_item_release_found
      - domain: automatic_speech_recognition
        protocol: Four English robustness sets for accented, emotional, background-audio, and conversational speech
        data_status: private_unreleased
        note: Section 7.2 explicitly calls all four ASR sets private. They total roughly 17 hours; public online video and Hume-DaiKon are source descriptions, not public benchmark downloads.
    note: The public Hugging Face Spaces expose leaderboards and application code, not benchmark audio or item files. RW-Voice-EQ is therefore recorded as an audited protocol rather than a downloadable benchmark family; no data link should be inferred from the public leaderboards.

  meetingtom:
    paper: https://arxiv.org/abs/2607.19235
    sections: 3 and appendices B and G
    status: audited_not_indexed
    public_interfaces:
      - https://oliviaziyi.github.io/MeetingToM-Project-Page/
      - https://github.com/oliviaziyi/MeetingToM
      - https://huggingface.co/datasets/OliviaWang1101/MeetingToM
    evaluated_domains:
      - domain: audiovisual_social_reasoning
        protocol: 1,800 English AMI Meeting Corpus clips from 60 sessions, split evenly across subject-level mental-state prediction, dyadic referential reasoning, and group-level consensus reasoning
        data_status: announced_unreleased
        note: The paper describes synchronized 5-second and approximately 50-second video, audio, and transcript inputs, but the official repositories currently contain no benchmark annotations, splits, clips, or evaluation code.
    license:
      paper: CC BY-NC-SA 4.0
      benchmark_data: not_specified_unreleased
      upstream: AMI Meeting Corpus terms apply to the source recordings
    sources:
      - https://arxiv.org/html/2607.19235v1#S3
      - https://arxiv.org/html/2607.19235v1#A2
      - https://raw.githubusercontent.com/oliviaziyi/MeetingToM/main/README.md
      - https://api.github.com/repos/oliviaziyi/MeetingToM
      - https://huggingface.co/datasets/OliviaWang1101/MeetingToM/raw/main/README.md
      - https://huggingface.co/api/datasets/OliviaWang1101/MeetingToM
    note: The official GitHub README promises code, benchmark files, evaluation scripts, and documentation "Coming Soon," while the Hugging Face repository contains only a README and zero bytes of dataset storage. MeetingToM is therefore an audited announced protocol, not a downloadable benchmark family. Recheck the official repositories before adding an indexed dataset or download helper.

  deaf:
    paper: https://arxiv.org/abs/2603.18048
    sections: 2 and appendix A.2-A.5
    status: audited_not_indexed
    public_interfaces: []
    evaluated_domains:
      - domain: acoustic_semantic_conflict
        protocol: 2,756 English stimuli across emotion-semantic, background-sound-semantic, and speaker-identity-semantic conflicts, evaluated at three levels of increasing textual interference
        data_status: no_public_release_found
        note: The paper reports 1,248 emotion, 1,260 background-sound, and 248 speaker-identity clips. Levels 2 and 3 reuse the same audio with misleading prompts rather than adding clips.
    license:
      paper: CC BY 4.0
      benchmark_data: not_specified_unreleased
      upstream: EMIS, DEMAND, ElevenLabs model, and generated-content terms would apply to any future release
    sources:
      - https://arxiv.org/html/2603.18048v2#S2
      - https://arxiv.org/html/2603.18048v2#A1.SS2
      - https://arxiv.org/html/2603.18048v2#A1.SS3
      - https://arxiv.org/html/2603.18048v2#A1.SS5
    note: The v2 paper contains no project, repository, dataset-card, archive, or download URL. Its detailed construction recipe and public DEMAND source do not make the derived stimuli, scripts, prompts, labels, or evaluation code public, so DEAF is recorded as an audited protocol rather than a downloadable benchmark family.

  negeval_audio:
    paper: https://arxiv.org/abs/2607.12290
    sections: 3, 5, and 6.4
    status: audited_not_indexed
    public_interfaces: []
    evaluated_domains:
      - domain: audio_language_negation_understanding
        protocol: Retrieval-Neg and four-option MCQ-Neg evaluations derived from the AudioCaps test split and Clotho evaluation split, with affirmation, negation, and hybrid MCQ conditions
        data_status: no_public_release_found
        note: The construction pipeline extracts present sound concepts, proposes contextually plausible absent concepts, verifies absence with Qwen2.5-Omni-7B, and uses Claude Opus 4.8 for text generation. A human audit of 460 automatically verified negative concepts across 200 sampled clips found 96.7% agreement.
    license:
      paper: arXiv perpetual non-exclusive license
      benchmark_data: not_specified_unreleased
      upstream: AudioCaps and Clotho data, caption, and source-media terms would apply to any future derived release
    sources:
      - https://arxiv.org/html/2607.12290v1#S3
      - https://arxiv.org/html/2607.12290v1#S5
      - https://arxiv.org/html/2607.12290v1#S6.SS4
      - https://export.arxiv.org/api/query?id_list=2607.12290
    note: The v1 paper provides no official project, repository, dataset card, archive, derived query or MCQ files, concept annotations, prompts, or evaluation code. Public AudioCaps and Clotho source datasets do not make NegEval-Audio's generated and verified annotations public, so it is recorded as an audited protocol rather than a downloadable benchmark family.

  av_syncbench:
    paper: https://arxiv.org/abs/2607.00726
    sections: 2.1-2.3
    status: audited_not_indexed
    public_interfaces:
      - https://fgt7t6g.github.io/AV-SyncBench/
      - https://github.com/fgt7t6g/AV-SyncBench
      - https://huggingface.co/datasets/coming245/AV-SyncBench
      - https://modelscope.cn/datasets/coming245/AVSyncBench
    evaluated_domains:
      - domain: audio_visual_synchronization
        protocol: 3,269 in-the-wild videos expanded into 38,390 samples across voice, music, and sound, with global-offset, local-jitter, global-speed-change, timbre-replacement, and sound-source-replacement challenges
        data_status: announced_unreleased
        note: The paper reports 10 scenarios and binary original-versus-perturbed accuracy on non-overlapping 0.64-second chunks, but the official repositories currently contain no videos, annotations, benchmark samples, or evaluation code.
    license:
      paper: arXiv perpetual non-exclusive license
      benchmark_data: not_specified_unreleased
      placeholder_card: MIT metadata tag only; no released benchmark files are present
      upstream: Rights and reuse terms for the public-online-platform source videos are unspecified
    sources:
      - https://arxiv.org/html/2607.00726v1#S2.SS2
      - https://fgt7t6g.github.io/AV-SyncBench/
      - https://raw.githubusercontent.com/fgt7t6g/AV-SyncBench/main/README.md
      - https://api.github.com/repos/fgt7t6g/AV-SyncBench
      - https://huggingface.co/datasets/coming245/AV-SyncBench/raw/main/README.md
      - https://huggingface.co/api/datasets/coming245/AV-SyncBench
    note: The paper and project page say that code and data are available, but the official GitHub README says they "will be released soon" and the public Hugging Face repository contains only README metadata with zero bytes of dataset storage. AV-SyncBench is therefore recorded as an audited announced protocol rather than a downloadable benchmark family; the card's MIT tag must not be treated as licensing unreleased or third-party source videos.

  multiref_compass:
    paper: https://arxiv.org/abs/2607.14189
    sections: abstract, 1, 3, and appendix B
    status: audited_not_indexed
    public_interfaces: []
    evaluated_domains:
      - domain: multi_reference_audio_video_generation
        protocol: 350 curated samples across multi-view subject preservation, heterogeneous reference composition, multi-entity binding, and audio-video reference-input challenges, scored with 14 sub-metrics under four evaluation dimensions
        data_status: no_public_release_found
        note: The benchmark uses image, video, and audio references plus text instructions and combines automatic metrics with a rejudging-enhanced MLLM-as-a-Judge protocol, but the paper provides no project, repository, dataset card, archive, item file, or evaluation-code link.
    license:
      paper: CC BY 4.0
      benchmark_data: not_specified_unreleased
      upstream: The paper describes Pexels and Freesound assets plus generated images and voices; their source-specific terms would remain relevant to any future release
    sources:
      - https://arxiv.org/html/2607.14189v1
      - https://arxiv.org/html/2607.14189v1#Sx3
      - https://arxiv.org/html/2607.14189v1#A2
      - https://export.arxiv.org/api/query?id_list=2607.14189
    note: MultiRef-Compass is recorded as an audited protocol rather than a downloadable benchmark family. The v1 paper and arXiv metadata expose no official data or code interface, so its 350 prompts, reference assets, metric routing, judge prompts, and evaluation implementation must not be inferred to be public from the paper's CC BY 4.0 license or its descriptions of permissively licensed source assets.

  scenebind:
    paper: https://arxiv.org/abs/2607.15265
    sections: 4.1-4.3 and appendix B
    status: audited_not_indexed
    public_interfaces:
      - https://scenebind.github.io/
    evaluated_domains:
      - domain: semantic_spatial_audio_visual_retrieval_and_grounding
        protocol: Human-verified Binaural benchmark with 1,066 two-second clips, plus a 97-clip Sphere360 hard benchmark, for six-direction audio-image-text retrieval, spatial retrieval, and object grounding
        data_status: no_public_item_release_found
        note: The paper reports 1,040 audio-visual, 325 audio-text, and 757 visual-text scene queries, 1,386 audio-relevant grounding targets, and 2,682 visual-relevant targets. The public project page exposes selected qualitative examples rather than benchmark item files, splits, or evaluation code.
    license:
      paper: arXiv perpetual non-exclusive license
      benchmark_data: not_specified_unreleased
      upstream: The Binaural corpus is derived from public-platform videos and Sphere360 from OmniAudio source videos; source-media and annotation rights are not stated for a public benchmark release
    sources:
      - https://arxiv.org/html/2607.15265v1#S4.SS1
      - https://arxiv.org/html/2607.15265v1#A2
      - https://arxiv.org/html/2607.15265v1#A2.SS4
      - https://scenebind.github.io/
    note: The paper describes its 38,430-clip Binaural training split as released, but neither the paper nor the official project page provides a dataset archive, repository, dataset card, item manifest, license, or evaluation-code link. The page hosts a selected qualitative viewer only. SceneBind is therefore recorded as an audited protocol rather than a downloadable benchmark family; recheck the official page before adding an indexed dataset or helper.

benchmarks:
  - id: mmau
    name: MMAU
    full_name: "MMAU: A Massive Multi-Task Audio Understanding and Reasoning Benchmark"
    qwen_cited_as: MMAU
    qwen_bucket: audio_understanding
    tasks:
      - audio_question_answering
      - audio_reasoning
    official:
      homepage: https://sakshi113.github.io/mmau_homepage/
      repo: https://github.com/Sakshi113/MMAU
      paper: https://arxiv.org/abs/2410.19168
    download:
      primary:
        - https://huggingface.co/datasets/gamma-lab-umd/MMAU-test-mini
        - https://huggingface.co/datasets/gamma-lab-umd/MMAU-test
      examples:
        - 'from datasets import load_dataset; ds = load_dataset("gamma-lab-umd/MMAU-test-mini")'
        - 'huggingface-cli download --repo-type dataset gamma-lab-umd/MMAU-test-mini --local-dir data/MMAU-test-mini'
    license:
      data: "HF cards: MMAU-test-mini is cc-by-nc-4.0; MMAU-test is mit"
      code: Apache-2.0
      notes: The two HF dataset cards list different licenses; re-check before redistribution.
    sources:
      - https://github.com/Sakshi113/MMAU
      - https://huggingface.co/datasets/gamma-lab-umd/MMAU-test-mini
      - https://huggingface.co/datasets/gamma-lab-umd/MMAU-test

  - id: mmar
    name: MMAR
    full_name: "MMAR: A Challenging Benchmark for Deep Reasoning in Speech, Audio, Music, and Their Mix"
    qwen_cited_as: MMAR
    qwen_bucket: audio_understanding
    tasks:
      - audio_question_answering
      - audio_reasoning
    official:
      repo: https://github.com/ddlBoJack/MMAR
      paper: https://arxiv.org/abs/2505.13032
      challenge: https://audio-reasoning-challenge.github.io/
    download:
      primary:
        - https://huggingface.co/datasets/BoJack/MMAR
      examples:
        - 'from datasets import load_dataset; ds = load_dataset("BoJack/MMAR")'
        - 'huggingface-cli download --repo-type dataset BoJack/MMAR --local-dir data/MMAR'
    license:
      data: cc-by-nc-4.0
      code: not_specified
      notes: GitHub repo did not expose a detected license; HF dataset card lists cc-by-nc-4.0.
    sources:
      - https://github.com/ddlBoJack/MMAR
      - https://huggingface.co/datasets/BoJack/MMAR

  - id: mmsu
    name: MMSU
    full_name: "MMSU: A Massive Multi-task Spoken Language Understanding and Reasoning Benchmark"
    qwen_cited_as: MMSU
    qwen_bucket: audio_understanding
    tasks:
      - spoken_language_understanding
      - speech_reasoning
    official:
      repo: https://github.com/dingdongwang/MMSU
      paper: https://arxiv.org/abs/2506.04779
      dataset: https://huggingface.co/datasets/ddwang2000/MMSU
    download:
      primary:
        - https://huggingface.co/datasets/ddwang2000/MMSU
      examples:
        - 'from datasets import load_dataset; ds = load_dataset("ddwang2000/MMSU")'
        - 'huggingface-cli download --repo-type dataset ddwang2000/MMSU --local-dir data/MMSU'
    license:
      data: mit
      code: not_specified
      notes: HF dataset card lists MIT; GitHub code repo did not expose a detected license.
    sources:
      - https://github.com/dingdongwang/MMSU
      - https://huggingface.co/datasets/ddwang2000/MMSU

  - id: mmau_pro
    name: MMAU-Pro
    full_name: "MMAU-Pro: A Challenging and Comprehensive Benchmark for Holistic Evaluation of Audio General Intelligence"
    qwen_cited_as: null
    qwen_bucket: audio_understanding
    tasks:
      - audio_question_answering
      - audio_reasoning
      - long_audio_understanding
      - multi_audio_reasoning
      - spatial_audio_reasoning
      - speech_understanding
      - sound_understanding
      - music_understanding
      - audio_instruction_following
    official:
      homepage: https://sonalkum.github.io/mmau-pro/
      repo: https://github.com/sonalkum/MMAUPro
      paper: https://arxiv.org/abs/2508.13992
      dataset: https://huggingface.co/datasets/gamma-lab-umd/MMAU-Pro
    download:
      primary:
        - https://huggingface.co/datasets/gamma-lab-umd/MMAU-Pro
        - https://github.com/sonalkum/MMAUPro
      examples:
        - 'scripts/download/mmau_pro.sh'
        - 'MMAU_PRO_DOWNLOAD_HF=1 scripts/download/mmau_pro.sh'
      notes: The public, ungated release contains 5,305 expert-authored multiple-choice and open-ended QA instances spanning 49 skills across speech, environmental sound, music, and their mixtures. It includes multiple-audio, spatial, instruction-following, and up-to-10-minute long-form cases. The helper downloads official documentation, repository metadata, the evaluator, and Hugging Face metadata by default; the Hugging Face API reports approximately 47.5 GB of repository storage, so the audio and test snapshot requires MMAU_PRO_DOWNLOAD_HF=1.
    license:
      data: CC-BY-NC-4.0_with_upstream_terms
      code: not_specified
      notes: The Hugging Face card declares CC BY-NC 4.0, but the paper says almost all audio was sourced from in-the-wild recordings and the spatial subset reuses EasyCom. Review source-media and EasyCom terms before redistribution or commercial use. The official GitHub repository has no license file or detected license, so evaluator code terms are unspecified.
    sources:
      - https://arxiv.org/abs/2508.13992
      - https://arxiv.org/html/2508.13992v1#Sx3
      - https://github.com/sonalkum/MMAUPro
      - https://raw.githubusercontent.com/sonalkum/MMAUPro/main/README.md
      - https://api.github.com/repos/sonalkum/MMAUPro
      - https://huggingface.co/datasets/gamma-lab-umd/MMAU-Pro
      - https://huggingface.co/datasets/gamma-lab-umd/MMAU-Pro/raw/main/README.md
      - https://huggingface.co/api/datasets/gamma-lab-umd/MMAU-Pro

  - id: mugen
    name: MUGEN
    full_name: "MUGEN: Evaluating and Improving Multi-audio Understanding of Large Audio-Language Models"
    qwen_cited_as: null
    qwen_bucket: audio_language_model_benchmark
    tasks:
      - multi_audio_understanding
      - audio_grounding
      - speech_understanding
      - speaker_and_demographic_understanding
      - paralinguistic_understanding
      - temporal_audio_reasoning
      - acoustic_scene_and_event_analysis
      - music_understanding
      - compositional_audio_reasoning
    official:
      repo: https://github.com/danielqwer/MUGEN
      paper: https://arxiv.org/abs/2603.09714
      dataset_collection: https://huggingface.co/MUGEN-Benchmark
    download:
      primary:
        - https://huggingface.co/MUGEN-Benchmark
        - https://github.com/danielqwer/MUGEN
      examples:
        - 'scripts/download/mugen.sh'
        - 'MUGEN_DOWNLOAD_TASK=Keyword_Spotting scripts/download/mugen.sh'
      notes: The public, ungated release provides 35 separate Hugging Face task repositories with 1,750 five-way audio-grounding problems and 9,250 audio clips across seven dimensions. Ten tasks add a reference clip, producing six concurrent audio inputs. The helper downloads official documentation, repository metadata, the license, and the Hugging Face collection inventory by default; set MUGEN_DOWNLOAD_TASK to one of the documented task names to explicitly download that task. The current cards report about 10.7 GB of compressed files across all task repositories and also expose reduced-candidate splits for input-scaling analysis.
    license:
      data: not_specified_with_mixed_upstream_terms
      code: MIT
      notes: The 35 Hugging Face dataset cards do not declare a data license. The repository's MIT license identifies its subject as software and associated documentation, so it should not be assumed to relicense embedded audio. The paper describes public corpora, specialized academic corpora, Mozilla Data Collective speech, and synthesized speech as sources; review each task's upstream corpus and generation terms before redistribution or commercial use.
    sources:
      - https://arxiv.org/abs/2603.09714
      - https://arxiv.org/html/2603.09714v1#S2
      - https://github.com/danielqwer/MUGEN
      - https://raw.githubusercontent.com/danielqwer/MUGEN/main/README.md
      - https://raw.githubusercontent.com/danielqwer/MUGEN/main/data/README.md
      - https://raw.githubusercontent.com/danielqwer/MUGEN/main/evaluation/README.md
      - https://raw.githubusercontent.com/danielqwer/MUGEN/main/LICENSE
      - https://api.github.com/repos/danielqwer/MUGEN
