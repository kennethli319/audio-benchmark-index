        - 'huggingface-cli download --repo-type dataset hlt-lab/voicebench --local-dir data/voicebench'
    license:
      data: apache-2.0
      code: Apache-2.0
      notes: HF dataset card and GitHub repo both list Apache-2.0.
    sources:
      - https://github.com/MatthewCYM/VoiceBench
      - https://huggingface.co/datasets/hlt-lab/voicebench

  - id: uro_bench_pro
    name: URO-Bench-pro
