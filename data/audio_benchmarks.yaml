      code: not_specified_currently_unavailable
      notes: The benchmark dataset card declares CC BY 4.0 and identifies LibriSpeech as CC BY 4.0, but the current RIR-Mega v2 card declares CC BY-NC 4.0 for its RIR audio. Apply the stricter non-commercial upstream terms to the derived reverberant audio unless the owner clarifies otherwise. The benchmark card says its curation repository is MIT, but the linked repository was unavailable, so that code license could not be independently verified.
