metadata:
  repo_name: audio-benchmark-index
  title: Audio Benchmark Index
  seed_source:
    name: Qwen3.5-Omni Technical Report, section 5.1 Audio -> Text
    url: https://arxiv.org/html/2604.15804v1#S5
  last_checked: 2026-07-09
  scope: Audio -> Text benchmarks cited by Qwen3.5-Omni section 5.1.
  note: This index does not mirror datasets or grant rights to upstream data.

benchmarks:
  - id: mmau
    name: MMAU
    full_name: "MMAU: A Massive Multi-Task Audio Understanding and Reasoning Benchmark"
    qwen_cited_as: MMAU
    qwen_bucket: audio_understanding
    tasks:
      - audio_question_answering
      - audio_reasoning
    official:
      homepage: https://sakshi113.github.io/mmau_homepage/
      repo: https://github.com/Sakshi113/MMAU
      paper: https://arxiv.org/abs/2410.19168
    download:
      primary:
        - https://huggingface.co/datasets/gamma-lab-umd/MMAU-test-mini
        - https://huggingface.co/datasets/gamma-lab-umd/MMAU-test
      examples:
        - 'from datasets import load_dataset; ds = load_dataset("gamma-lab-umd/MMAU-test-mini")'
        - 'huggingface-cli download --repo-type dataset gamma-lab-umd/MMAU-test-mini --local-dir data/MMAU-test-mini'
    license:
      data: "HF cards: MMAU-test-mini is cc-by-nc-4.0; MMAU-test is mit"
      code: Apache-2.0
      notes: The two HF dataset cards list different licenses; re-check before redistribution.
    sources:
      - https://github.com/Sakshi113/MMAU
      - https://huggingface.co/datasets/gamma-lab-umd/MMAU-test-mini
      - https://huggingface.co/datasets/gamma-lab-umd/MMAU-test

  - id: mmar
    name: MMAR
    full_name: "MMAR: A Challenging Benchmark for Deep Reasoning in Speech, Audio, Music, and Their Mix"
    qwen_cited_as: MMAR
    qwen_bucket: audio_understanding
    tasks:
      - audio_question_answering
      - audio_reasoning
    official:
      repo: https://github.com/ddlBoJack/MMAR
      paper: https://arxiv.org/abs/2505.13032
      challenge: https://audio-reasoning-challenge.github.io/
    download:
      primary:
        - https://huggingface.co/datasets/BoJack/MMAR
      examples:
        - 'from datasets import load_dataset; ds = load_dataset("BoJack/MMAR")'
        - 'huggingface-cli download --repo-type dataset BoJack/MMAR --local-dir data/MMAR'
    license:
      data: cc-by-nc-4.0
      code: not_specified
      notes: GitHub repo did not expose a detected license; HF dataset card lists cc-by-nc-4.0.
    sources:
      - https://github.com/ddlBoJack/MMAR
      - https://huggingface.co/datasets/BoJack/MMAR

  - id: mmsu
    name: MMSU
    full_name: "MMSU: A Massive Multi-task Spoken Language Understanding and Reasoning Benchmark"
    qwen_cited_as: MMSU
    qwen_bucket: audio_understanding
    tasks:
      - spoken_language_understanding
      - speech_reasoning
    official:
      repo: https://github.com/dingdongwang/MMSU
      paper: https://arxiv.org/abs/2506.04779
      dataset: https://huggingface.co/datasets/ddwang2000/MMSU
    download:
      primary:
        - https://huggingface.co/datasets/ddwang2000/MMSU
      examples:
        - 'from datasets import load_dataset; ds = load_dataset("ddwang2000/MMSU")'
        - 'huggingface-cli download --repo-type dataset ddwang2000/MMSU --local-dir data/MMSU'
    license:
      data: mit
      code: not_specified
      notes: HF dataset card lists MIT; GitHub code repo did not expose a detected license.
    sources:
      - https://github.com/dingdongwang/MMSU
      - https://huggingface.co/datasets/ddwang2000/MMSU

  - id: slurp
    name: SLURP
    full_name: "SLURP: A Spoken Language Understanding Resource Package"
    qwen_cited_as: null
    qwen_bucket: spoken_language_understanding
    tasks:
      - spoken_language_understanding
      - intent_classification
      - slot_filling
      - semantic_entity_labeling
    official:
      repo: https://github.com/pswietojanski/slurp
      paper: https://aclanthology.org/2020.emnlp-main.588/
      zenodo: https://zenodo.org/records/4274930
      arxiv: https://arxiv.org/abs/2011.13205
    download:
      primary:
        - https://github.com/pswietojanski/slurp
        - https://zenodo.org/records/4274930
        - https://zenodo.org/api/records/4274930/files/LICENSE.txt/content
        - https://zenodo.org/api/records/4274930/files/slurp_real.tar.gz/content
        - https://zenodo.org/api/records/4274930/files/slurp_synth.tar.gz/content
      examples:
        - 'scripts/download/slurp.sh'
        - 'SLURP_DOWNLOAD_AUDIO=1 SLURP_AUDIO_PARTS=real scripts/download/slurp.sh'
        - 'SLURP_DOWNLOAD_AUDIO=1 SLURP_AUDIO_PARTS="real synth" scripts/download/slurp.sh'
      notes: The helper clones or updates the official annotation/code repository by default and downloads Zenodo LICENSE.txt. Audio archives are about 3.9 GiB real plus 2.8 GiB synthetic, so audio download is an explicit opt-in.
    license:
      data: "Textual annotations are CC BY 4.0; Zenodo-hosted audio is non-commercial (Zenodo license id other-nc; GitHub README states CC BY-NC 4.0)."
      code: not_specified
      notes: GitHub README separates textual data and audio licensing and says a less-strict audio license may be available by contacting the dataset owner. No standalone code license file was found in the repo via raw GitHub on 2026-07-09.
    sources:
      - https://github.com/pswietojanski/slurp
      - https://zenodo.org/records/4274930
      - https://aclanthology.org/2020.emnlp-main.588/
      - https://arxiv.org/abs/2011.13205

  - id: rul_muchomusic
    name: RUL-MuchoMusic
    full_name: "RUL-MuchoMusic from RUListening / Are You Really Listening?"
    qwen_cited_as: RUL-MuchoMusic
    qwen_bucket: audio_understanding
    tasks:
      - music_question_answering
      - perceptual_music_understanding
    official:
      repo: https://github.com/yongyizang/AreYouReallyListening
      paper: https://arxiv.org/abs/2504.00369
      upstream_benchmark: https://github.com/mulab-mir/muchomusic
    download:
      primary:
        - https://raw.githubusercontent.com/yongyizang/AreYouReallyListening/main/RUL-MuchoMusic.json
        - https://huggingface.co/datasets/yongyizang/RUListening
      examples:
        - 'wget -P data/RUL-MuchoMusic https://raw.githubusercontent.com/yongyizang/AreYouReallyListening/main/RUL-MuchoMusic.json'
        - 'huggingface-cli download --repo-type dataset yongyizang/RUListening --local-dir data/RUListening'
    license:
      data: "RUL repo/HF card: mit; upstream MuChoMusic dataset: CC BY-SA 4.0"
      code: MIT
      notes: RUL-MuchoMusic derives from MuChoMusic; check upstream audio/source terms too.
    sources:
      - https://github.com/yongyizang/AreYouReallyListening
      - https://huggingface.co/datasets/yongyizang/RUListening
      - https://github.com/mulab-mir/muchomusic
      - https://zenodo.org/records/12709974

  - id: songformbench
    name: SongFormBench
    full_name: SongFormBench
    qwen_cited_as: SongFormBench
    qwen_bucket: audio_understanding
    tasks:
      - music_structure_analysis
    official:
      repo: https://github.com/ASLP-lab/SongFormer
      dataset: https://huggingface.co/datasets/ASLP-lab/SongFormBench
      paper: https://arxiv.org/abs/2510.02797
    download:
      primary:
        - https://huggingface.co/datasets/ASLP-lab/SongFormBench
      examples:
        - 'from datasets import load_dataset; ds = load_dataset("ASLP-lab/SongFormBench")'
        - 'huggingface-cli download --repo-type dataset ASLP-lab/SongFormBench --local-dir data/SongFormBench'
    license:
      data: cc-by-4.0
      code: cc-by-4.0
      notes: Dataset card lists CC BY 4.0. Audio reconstruction notes reference HarmonixSet and BigVGAN resources.
    sources:
      - https://huggingface.co/datasets/ASLP-lab/SongFormBench
      - https://github.com/ASLP-lab/SongFormer

  - id: nsynth
    name: NSynth
    full_name: "NSynth: Neural Audio Synthesis of Musical Notes with WaveNet Autoencoders"
    qwen_cited_as: null
    qwen_bucket: music_synthesis
    tasks:
      - audio_synthesis
      - music_synthesis
      - musical_instrument_modeling
      - timbre_modeling
    official:
      homepage: https://magenta.withgoogle.com/datasets/nsynth
      paper: https://arxiv.org/abs/1704.01279
      pmlr_paper: https://proceedings.mlr.press/v70/engel17a.html
      tfds: https://www.tensorflow.org/datasets/catalog/nsynth
    download:
      primary:
        - https://magenta.withgoogle.com/datasets/nsynth
        - https://storage.googleapis.com/download.magenta.tensorflow.org/datasets/nsynth/nsynth-test.jsonwav.tar.gz
        - https://storage.googleapis.com/download.magenta.tensorflow.org/datasets/nsynth/nsynth-test.tfrecord
      examples:
        - 'scripts/download/nsynth.sh'
        - 'NSYNTH_DOWNLOAD_ARCHIVES=1 NSYNTH_SPLITS=test NSYNTH_FORMAT=jsonwav scripts/download/nsynth.sh'
        - 'python -c "import tensorflow_datasets as tfds; tfds.load(\"nsynth\", split=\"test\")"'
      notes: The full TFDS download is about 73 GiB. The helper saves the official dataset page by default and requires NSYNTH_DOWNLOAD_ARCHIVES=1 before downloading split archives.
    license:
      data: cc-by-4.0
      code: Apache-2.0
      notes: Official Magenta dataset page lists the dataset under CC BY 4.0; Magenta code is Apache-2.0.
    sources:
      - https://magenta.withgoogle.com/datasets/nsynth
      - https://www.tensorflow.org/datasets/catalog/nsynth
      - https://arxiv.org/abs/1704.01279
      - https://proceedings.mlr.press/v70/engel17a.html

  - id: maestro
    name: MAESTRO
    full_name: "MAESTRO: MIDI and Audio Edited for Synchronous TRacks and Organization"
    qwen_cited_as: null
    qwen_bucket: music_transcription
    tasks:
      - automatic_music_transcription
      - piano_transcription
      - music_synthesis
      - symbolic_music_modeling
    official:
      homepage: https://magenta.withgoogle.com/datasets/maestro
      blog: https://magenta.withgoogle.com/maestro-wave2midi2wave
      paper: https://arxiv.org/abs/1810.12247
      openreview: https://openreview.net/forum?id=r1lYRjC9F7
    download:
      primary:
        - https://magenta.withgoogle.com/datasets/maestro
        - https://storage.googleapis.com/magentadata/datasets/maestro/v3.0.0/maestro-v3.0.0.csv
        - https://storage.googleapis.com/magentadata/datasets/maestro/v3.0.0/maestro-v3.0.0.json
        - https://storage.googleapis.com/magentadata/datasets/maestro/v3.0.0/maestro-v3.0.0-midi.zip
      examples:
        - 'scripts/download/maestro.sh'
        - 'MAESTRO_DOWNLOAD_MIDI=1 scripts/download/maestro.sh'
        - 'MAESTRO_DOWNLOAD_AUDIO=1 scripts/download/maestro.sh'
      notes: The helper downloads v3.0.0 CSV/JSON metadata by default. The MIDI-only archive is about 56 MiB and the full WAV+MIDI archive is about 101 GiB, so both are explicit opt-ins.
    license:
      data: cc-by-nc-sa-4.0
      code: not_applicable
      notes: Official Magenta page says the dataset is made available by Google LLC under Creative Commons Attribution Non-Commercial Share-Alike 4.0.
    sources:
      - https://magenta.withgoogle.com/datasets/maestro
      - https://magenta.withgoogle.com/maestro-wave2midi2wave
      - https://arxiv.org/abs/1810.12247
      - https://openreview.net/forum?id=r1lYRjC9F7

