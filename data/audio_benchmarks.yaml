      notes: >-
        The public v1 repository contains ground-truth timelines for four
        hand-reviewed Sikh Kirtan recordings, each evaluated from 0%, 33%,
        and 66% start offsets, giving 12 cases and approximately 57 minutes
        of scored audio. It also releases a standard-library Python scorer,
        visualization and annotation tools, and empty, shifted, and perfect
        baselines. The primary metric is one-second frame accuracy with a
        one-second boundary collar. The helper downloads official
        documentation and repository metadata by default; cloning the small
        repository with annotations and evaluation code is opt-in. Audio is
        not redistributed: the official README identifies four YouTube video
        IDs and provides yt-dlp/ffmpeg preparation commands, so availability
        and source-media rights must be checked separately.
