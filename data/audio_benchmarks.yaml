      code: "CC BY 4.0, except third-party datasets with their own terms"
      notes: License.txt says users must comply with original licenses for third-party datasets.
    sources:
      - https://github.com/Tencent/WildSpeech-Bench
      - https://huggingface.co/datasets/tencent/WildSpeech-Bench

  - id: fleurs
    name: FLEURS
    full_name: "FLEURS: Few-shot Learning Evaluation of Universal Representations of Speech"
    qwen_cited_as: Fleurs
    qwen_bucket:
      - speech_to_text_translation
      - automatic_speech_recognition
    tasks:
      - asr
      - speech_translation
      - language_identification
    official:
      google_research: https://research.google/pubs/fleurs-few-shot-learning-evaluation-of-universal-representations-of-speech/
      dataset: https://huggingface.co/datasets/google/fleurs
      paper: https://arxiv.org/abs/2205.12446
    download:
      primary:
        - https://huggingface.co/datasets/google/fleurs
      examples:
        - 'from datasets import load_dataset; ds = load_dataset("google/fleurs", "en_us")'
        - 'from datasets import load_dataset; ds = load_dataset("google/fleurs", "all")'
    license:
      data: cc-by-4.0
      code: not_applicable
      notes: HF dataset card lists CC BY 4.0.
    sources:
      - https://huggingface.co/datasets/google/fleurs
      - https://research.google/pubs/fleurs-few-shot-learning-evaluation-of-universal-representations-of-speech/

  - id: voxpopuli
    name: VoxPopuli
    full_name: "VoxPopuli: A Large-Scale Multilingual Speech Corpus for Representation Learning, Semi-Supervised Learning and Interpretation"
    qwen_cited_as: null
    qwen_bucket:
      - automatic_speech_recognition
      - speech_to_text_translation
    tasks:
      - multilingual_asr
      - speech_to_text_translation
      - self_supervised_speech_representation_learning
      - accented_speech_recognition
    official:
      repo: https://github.com/facebookresearch/voxpopuli
      hf_dataset: https://huggingface.co/datasets/facebook/voxpopuli
      paper: https://aclanthology.org/2021.acl-long.80/
      arxiv: https://arxiv.org/abs/2101.00390
    download:
      primary:
        - https://huggingface.co/datasets/facebook/voxpopuli
        - https://github.com/facebookresearch/voxpopuli
      examples:
        - 'from datasets import load_dataset; ds = load_dataset("facebook/voxpopuli", "en", split="validation")'
        - 'VOXPOPULI_CONFIG=en VOXPOPULI_SPLITS="test validation" scripts/download/voxpopuli.sh'
      notes: HF hosts converted Parquet shards and is about 673 GiB total; select a language/config and split before downloading.
    license:
      data: cc0-1.0
      code: cc-by-nc-4.0
      notes: Official repo lists VoxPopuli data as CC0 and points users to the European Parliament legal notice for raw data; code and pretrained models are CC BY-NC 4.0.
    sources:
      - https://github.com/facebookresearch/voxpopuli
      - https://huggingface.co/datasets/facebook/voxpopuli
      - https://aclanthology.org/2021.acl-long.80/

  - id: mtedx
    name: mTEDx
    full_name: "The Multilingual TEDx Corpus for Speech Recognition and Translation"
    qwen_cited_as: null
    qwen_bucket:
      - automatic_speech_recognition
      - speech_to_text_translation
    tasks:
      - multilingual_asr
      - speech_to_text_translation
      - speech_translation
      - sentence_level_alignment
    official:
      openslr: https://www.openslr.org/100
      paper: https://arxiv.org/abs/2102.01757
      interspeech_paper: https://www.isca-archive.org/interspeech_2021/salesky21_interspeech.html
      iwslt_2021: https://iwslt.org/2021/
    download:
      primary:
        - https://www.openslr.org/100
        - https://openslr.trmal.net/resources/100/mtedx_iwslt2021.tgz
        - https://openslr.trmal.net/resources/100/MTEDx-french-talks-gender-annotation.csv
      examples:
        - 'scripts/download/mtedx.sh'
        - 'MTEDX_DOWNLOAD_ARCHIVES=1 MTEDX_PARTS=mtedx_iwslt2021.tgz scripts/download/mtedx.sh'
        - 'MTEDX_DOWNLOAD_ARCHIVES=1 MTEDX_PARTS="mtedx_es-en.tgz mtedx_fr-en.tgz" scripts/download/mtedx.sh'
      notes: OpenSLR SLR100 hosts ASR-only language archives, speech-translation language-pair archives, IWSLT 2021 test sets, and a small French talk gender annotation CSV. Archives are multi-GiB, so the helper downloads only the OpenSLR page and small CSV by default and requires MTEDX_DOWNLOAD_ARCHIVES=1 for archive downloads.
    license:
      data: cc-by-nc-nd-4.0
      code: not_specified
      notes: OpenSLR SLR100 lists CC BY-NC-ND 4.0. The corpus is derived from TEDx Talks; respect TED/TEDx source terms as well as the corpus license.
    sources:
      - https://www.openslr.org/100
      - https://arxiv.org/abs/2102.01757
      - https://www.isca-archive.org/interspeech_2021/salesky21_interspeech.html

  - id: covost2
    name: CoVoST 2
    full_name: "CoVoST 2: Massively Multilingual Speech-to-Text Translation Corpus"
    qwen_cited_as: null
    qwen_bucket:
      - speech_to_text_translation
      - automatic_speech_recognition
    tasks:
      - speech_to_text_translation
      - speech_translation
      - multilingual_asr
      - machine_translation
    official:
      homepage: https://ai.meta.com/tools/covost/
      repo: https://github.com/facebookresearch/covost
      hf_dataset: https://huggingface.co/datasets/facebook/covost2
      paper: https://arxiv.org/abs/2007.10310
      interspeech_paper: https://www.isca-archive.org/interspeech_2021/wang21s_interspeech.html
    download:
      primary:
        - https://github.com/facebookresearch/covost
        - https://huggingface.co/datasets/facebook/covost2
        - https://dl.fbaipublicfiles.com/covost/covost_v2.en_de.tsv.tar.gz
        - https://dl.fbaipublicfiles.com/covost/covost_v2.fr_en.tsv.tar.gz
      examples:
        - 'scripts/download/covost2.sh'
        - 'COVOST2_DIRECTIONS="en_de fr_en" scripts/download/covost2.sh'
        - 'COVOST2_DIRECTIONS=all scripts/download/covost2.sh'
        - 'from datasets import load_dataset; ds = load_dataset("facebook/covost2", "en_de", split="test", trust_remote_code=True)'
      notes: The helper downloads the official CoVoST 2 translation TSV archives and split-generation script. CoVoST 2 rows match Common Voice 4 validated.tsv entries, so users must obtain Common Voice audio separately under the applicable upstream terms.
    license:
      data: "Meta/GitHub list CoVoST data as CC0; the current Hugging Face card lists CC BY-NC 4.0, and current Mozilla Data Collective packages for CoVoST 2/Common Voice segments may be CC BY-NC 4.0."
      code: cc-by-nc-4.0
      notes: Treat packaged mirrors conservatively and re-check the active source before redistribution. The GitHub license table also says Tatoeba evaluation sentences are CC BY 2.0 FR and Tatoeba speech has per-row licenses.
    sources:
      - https://ai.meta.com/tools/covost/
      - https://github.com/facebookresearch/covost
      - https://huggingface.co/datasets/facebook/covost2
      - https://arxiv.org/abs/2007.10310
      - https://www.isca-archive.org/interspeech_2021/wang21s_interspeech.html

  - id: gigaspeech
    name: GigaSpeech
    full_name: "GigaSpeech: An Evolving, Multi-domain ASR Corpus with 10,000 Hours of Transcribed Audio"
    qwen_cited_as: null
    qwen_bucket: automatic_speech_recognition
    tasks:
      - asr
      - large_scale_speech_recognition
      - text_to_speech
    official:
      repo: https://github.com/SpeechColab/GigaSpeech
