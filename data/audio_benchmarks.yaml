    qwen_cited_as: null
    qwen_bucket: environmental_audio
    tasks:
      - environmental_sound_classification
      - beehive_acoustic_monitoring
      - colony_strength_regression
      - hive_health_monitoring
      - acoustic_phenotyping
    official:
      dataset: https://doi.org/10.20383/103.0972
      paper: https://doi.org/10.1038/s41597-025-04869-1
